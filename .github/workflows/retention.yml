name: Retention — archive and purge old bulletins

on:
  workflow_run:
    workflows: ["Harvest Parish Bulletins"]
    types: [completed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only — make no changes (true/false)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write
  issues: write

jobs:
  retention:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run retention policy
        id: retention
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          python - <<'PYEOF'
          import json, os, sys
          from pathlib import Path
          from harvester.retention import apply_retention

          dry_run = os.getenv("DRY_RUN", "false").strip().lower() == "true"
          if dry_run:
              print("⚠️  DRY RUN — no files will be changed.")

          report = apply_retention(Path("."), dry_run=dry_run)

          print("=== Retention report ===")
          print(f"Before: {report['before_bytes'] / 1024**3:.3f} GB")
          print(f"After:  {report['after_bytes'] / 1024**3:.3f} GB")
          print(f"Zipped: {len(report['zipped_files'])} file(s)")
          print(f"Deleted: {len(report['deleted_files'])} file(s)")
          if report['warnings']:
              print("Warnings:")
              for w in report['warnings']:
                  print(f"  ⚠️  {w}")

          # Write report for later steps
          with open("retention_report.json", "w") as fh:
              json.dump(report, fh, indent=2)

          # Exit non-zero if warnings include hard cap breach
          cap_warning = any("exceeds hard cap" in w for w in report['warnings'])
          if cap_warning and not dry_run:
              sys.exit(2)  # signal step to open issue
          PYEOF

      - name: Commit retention changes
        if: github.event.inputs.dry_run != 'true' && steps.retention.outcome == 'success'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A Bulletins/archive/ docs/bulletins/ mega_pdf/ 2>/dev/null || true
          git add -A Bulletins/current/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "ℹ️  No changes from retention — nothing to commit."
            exit 0
          fi
          BEFORE=$(python -c "import json; r=json.load(open('retention_report.json')); print(f\"{r['before_bytes']/1024**3:.3f}\")")
          AFTER=$(python -c "import json; r=json.load(open('retention_report.json')); print(f\"{r['after_bytes']/1024**3:.3f}\")")
          git commit -m "chore: retention — archive old bulletins (${BEFORE} GB → ${AFTER} GB) [skip ci]"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "✅ Pushed on attempt ${attempt}"
              exit 0
            fi
            git pull --rebase origin main
          done
          echo "❌ Could not push after 3 attempts."
          exit 1

      - name: Open storage cap warning issue
        if: steps.retention.conclusion == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPORT=$(cat retention_report.json 2>/dev/null || echo '{}')
          AFTER_GB=$(python -c "import json; r=$REPORT; print(f\"{r.get('after_bytes',0)/1024**3:.3f}\")" 2>/dev/null || echo "unknown")
          WARNINGS=$(python -c "
          import json
          r = json.load(open('retention_report.json'))
          print('\n'.join(f'- {w}' for w in r.get('warnings', [])))
          " 2>/dev/null || echo "- See retention_report.json for details")
          gh issue create \
            --title "🚨 Storage cap warning — repo is ${AFTER_GB} GB" \
            --body "## Storage cap warning

          The retention workflow detected that the repository has exceeded or approached the 4 GB hard cap.

          ### Warnings
          ${WARNINGS}

          ### What to do
          1. Trigger the retention workflow manually with \`dry_run: false\`.
          2. If the problem persists, reduce \`keep_months_archive\` in \`parishes/retention_policy.json\`.
          3. In the worst case, a full Git history purge (\`git filter-repo\`) may be needed.

          _This issue was auto-opened by the retention workflow._" \
            --label "storage" || true
