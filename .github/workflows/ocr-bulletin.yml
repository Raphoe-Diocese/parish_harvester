name: Generate OCR bulletin viewers

on:
  workflow_run:
    workflows: ["Harvest Parish Bulletins"]
    types:
      - completed

permissions:
  contents: write

jobs:
  generate-ocr-viewers:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-ocr.txt

      - name: Install poppler
        run: |
          sudo apt-get update -y
          sudo apt-get install -y poppler-utils

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt -r requirements-ocr.txt

      - name: Download mega PDF artifacts from harvest run
        uses: actions/download-artifact@v4.1.3
        continue-on-error: false
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          pattern: "*-mega-bulletin-pdf"
          path: /tmp/ocr-bulletins/
          merge-multiple: true

      - name: Generate OCR viewer pages
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          mkdir -p /tmp/ocr-bulletins
          FAILURES=0
          for diocese in derry down_and_connor; do
            pdf_path="/tmp/ocr-bulletins/${diocese}_mega_bulletin.pdf"
            if [ ! -f "${pdf_path}" ]; then
              echo "Warning: PDF not found for ${diocese}, skipping"
              continue
            fi
            workdir="/tmp/ocr-bulletins/${diocese}"
            mkdir -p "${workdir}"
            ocr_html="${workdir}/bulletin-${TODAY}.html"
            echo "=== OCR ${diocese} ==="
            if ! (
              cd "${workdir}"
              python "${GITHUB_WORKSPACE}/ocr/convert_bulletin.py" "${pdf_path}" "${TODAY}"
            ); then
              echo "::warning::convert_bulletin failed for ${diocese}"
              FAILURES=$((FAILURES + 1))
              continue
            fi
            if ! python ocr/generate_bulletin_pages.py \
              --diocese "${diocese}" \
              --date "${TODAY}" \
              --pdf "${pdf_path}" \
              --ocr-html "${ocr_html}"; then
              echo "::warning::generate_bulletin_pages failed for ${diocese}"
              FAILURES=$((FAILURES + 1))
              continue
            fi
            echo "OK: ${diocese}"
          done
          if [ "${FAILURES}" -gt 0 ]; then
            echo "::warning::OCR completed with ${FAILURES} diocese failure(s) — other dioceses still committed."
          fi

      - name: Commit generated bulletin pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs Bulletins
          git diff --cached --quiet && exit 0
          git commit -m "chore: update OCR bulletin viewers for $(date -u +%Y-%m-%d)"
          git push origin HEAD:main
