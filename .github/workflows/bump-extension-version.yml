name: Bump extension version

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump extension manifest patch version
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          manifest_path = Path("extension/manifest.json")
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))

          version_raw = str(manifest.get("version", ""))
          parts = version_raw.split(".")
          if len(parts) != 3 or not all(part.isdigit() for part in parts):
            raise SystemExit(
              f"extension/manifest.json version must be major.minor.patch, got: {version_raw!r}"
            )
          major, minor, patch = map(int, parts)
          manifest["version"] = f"{major}.{minor}.{patch + 1}"
          manifest_path.write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Commit and push updated manifest
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extension/manifest.json
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi
          # Keep CI enabled so deploy-pages publishes matching extension package + updates.xml.
          git commit -m "chore: bump extension version"
          git push
