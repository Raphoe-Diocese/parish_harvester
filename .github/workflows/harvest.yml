name: Harvest Parish Bulletins

on:
  schedule:
    - cron: '0 13 * * 0'   # Every Sunday at 13:00 UTC
  workflow_dispatch:
    inputs:
      diocese:
        description: 'Diocese to harvest (or "all" for every diocese)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - derry_diocese
          - down_and_connor
      target_parish:
        description: 'Parish key for instant single-parish rebuild (leave empty for full run)'
        required: false
        default: ''
        type: string
      run_tests:
        description: 'Run tests before harvesting (set false for emergency/manual runs)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  issues: write

concurrency:
  group: harvest-push
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          set -euo pipefail
          pip install -r requirements.txt
          pip install pytest

      - name: Install Playwright browsers
        run: |
          set -euo pipefail
          python -m playwright install --with-deps chromium

      - name: Run tests
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_tests == 'true'
        continue-on-error: true
        id: tests
        run: |
          set -euo pipefail
          pytest -v --tb=short

      - name: Note test failures (harvest continues)
        if: steps.tests.outcome == 'failure'
        run: |
          echo "::warning::Tests failed — harvest will still run. Fix tests soon; see test.yml on push."

      - name: Run Bulletin Harvester
        run: |
          set -euo pipefail
          ARGS="--diocese ${{ github.event.inputs.diocese || 'all' }}"
          if [ -n "${{ github.event.inputs.target_parish }}" ]; then
            ARGS="$ARGS --target-parish ${{ github.event.inputs.target_parish }}"
          fi
          xvfb-run -a python main.py $ARGS
        env:
          HARVEST_EMAIL_TO: ${{ secrets.HARVEST_EMAIL_TO }}
          HARVEST_EMAIL_FROM: ${{ secrets.HARVEST_EMAIL_FROM }}
          EMAIL_PROVIDER: ${{ secrets.EMAIL_PROVIDER }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          PARISH_NO_MISTRAL_FALLBACK: "1"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Validate harvest outputs
        if: success()
        run: |
          set -euo pipefail
          if [ ! -f Bulletins/report.json ]; then
            echo "Error: expected harvest output missing: Bulletins/report.json"
            exit 1
          fi
          if [ ! -f Bulletins/report.txt ]; then
            echo "Error: expected harvest output missing: Bulletins/report.txt"
            exit 1
          fi

      - name: Write workflow step summary
        if: always()
        run: |
          set -euo pipefail
          if [ -f Bulletins/report.json ]; then
            python - <<'PYEOF'
          import json, os
          d = json.load(open("Bulletins/report.json"))
          s = d.get("summary", {})
          dl = s.get("downloaded", 0)
          hl = s.get("html_links", 0)
          fa = s.get("failed", 0)
          total = dl + fa
          rate = f"{dl/total*100:.1f}%" if total > 0 else "N/A"
          lines = [
              f"## 📋 Bulletin Harvest — {d.get('target_date','?')}",
              "",
              f"| Metric | Value |",
              f"|--------|-------|",
              f"| ✅ Downloaded | {dl} |",
              f"| 🔗 HTML links | {hl} |",
              f"| 💥 Failed | {fa} |",
              f"| 📈 Success rate | {rate} |",
              "",
          ]
          if d.get("failed"):
              lines += ["### ❌ Failed parishes (need re-training)", ""]
              for f in d["failed"]:
                  lines.append(f"- **{f['display_name']}** — _{f.get('error','?')[:120]}_")
              lines.append("")
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as fh:
              fh.write("\n".join(lines))
          PYEOF
          fi
          if [ ! -f Bulletins/report.json ]; then
            echo "## ❌ Bulletin Harvest failed before report generation" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Expected \`Bulletins/report.json\` was not created." >> "$GITHUB_STEP_SUMMARY"
            echo "See failed logs in run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Post GitHub Issue summary
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -f Bulletins/report.json ]; then
            DIOCESE="${{ github.event.inputs.diocese || 'all' }}"
            REPORT_DATE=$(python -c "import json; d=json.load(open('Bulletins/report.json')); print(d.get('target_date','unknown'))")
            REPORT_DATE_UK=$(python -c "import json; d=json.load(open('Bulletins/report.json')); v=d.get('target_date','unknown'); parts=v.split('-'); print('/'.join([parts[2],parts[1],parts[0]]) if len(parts)==3 else v)")
            DOWNLOADED=$(python -c "import json; d=json.load(open('Bulletins/report.json')); print(d['summary']['downloaded'])")
            HTML_LINKS=$(python -c "import json; d=json.load(open('Bulletins/report.json')); print(d['summary']['html_links'])")
            FAILED=$(python -c "import json; d=json.load(open('Bulletins/report.json')); print(d['summary']['failed'])")
            FAILED_LIST=$(python -c "
          import json
          d = json.load(open('Bulletins/report.json'))
          ffs = d.get('failed', [])
          if ffs:
              lines = []
              for f in ffs:
                  lines.append('- **' + f['display_name'] + '** (' + f.get('url','') + ')  ')
                  lines.append('  _Reason: ' + f.get('error','unknown') + '_')
              print('\n'.join(lines))
          else:
              print('_None_ \U0001f389')
          ")
            HTML_LIST=$(python -c "
          import json
          d = json.load(open('Bulletins/report.json'))
          hls = d.get('html_links', [])
          if hls:
              print('\n'.join('- **' + h['display_name'] + '**: [' + h['url'] + '](' + h['url'] + ')' for h in hls))
          else:
              print('_None_')
          ")
            BODY="## 📋 Bulletin Harvest Report — ${DIOCESE} — ${REPORT_DATE_UK}

          **Diocese:** \`${DIOCESE}\`

          | Category | Count |
          |----------|-------|
          | ✅ Downloaded | ${DOWNLOADED} |
          | 🔗 HTML links | ${HTML_LINKS} |
          | 💥 Failed | ${FAILED} |

          ### Failed Parishes

          ${FAILED_LIST}

          ### HTML-Only Parishes (links in mega PDF)

          ${HTML_LIST}

          [View workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"

            ISSUE_TITLE="📋 Bulletin Harvest Report — ${DIOCESE} — ${REPORT_DATE_UK}"

            # Close superseded open reports for this same diocese only
            gh issue list \
              --state open \
              --json number,title \
              --limit 100 \
              --jq ".[] | select(.title | startswith(\"📋 Bulletin Harvest Report — ${DIOCESE} — \")) | select(.title != \"${ISSUE_TITLE}\") | .number" \
              | xargs -r -I{} gh issue close {} --comment "Superseded by newer harvest report." || true

            # Find existing open issue with exactly today's diocese+date title
            EXISTING_ISSUE=$(gh issue list \
              --state open \
              --json number,title \
              --limit 100 \
              --jq ".[] | select(.title == \"${ISSUE_TITLE}\") | .number" \
              | head -n 1)

            if [ -n "${EXISTING_ISSUE}" ]; then
              echo "Updating existing issue #${EXISTING_ISSUE}"
              gh issue edit "${EXISTING_ISSUE}" --body "${BODY}"
            else
              echo "Creating new issue"
              gh issue create \
                --title "${ISSUE_TITLE}" \
                --body "${BODY}" \
                --label "harvest-report" 2>/dev/null || \
              gh issue create \
                --title "${ISSUE_TITLE}" \
                --body "${BODY}" || true
            fi
          fi

      - name: Commit bulletins back to repo
        if: success()
        continue-on-error: true
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Copy mega PDFs into docs/ so GitHub Pages can serve them
          mkdir -p docs/mega_pdf
          if [ -f mega_pdf/derry_mega_bulletin.pdf ]; then
            cp mega_pdf/derry_mega_bulletin.pdf docs/mega_pdf/derry_mega_bulletin.pdf
          fi
          if [ -f mega_pdf/down_and_connor_mega_bulletin.pdf ]; then
            cp mega_pdf/down_and_connor_mega_bulletin.pdf docs/mega_pdf/down_and_connor_mega_bulletin.pdf
          fi
          git add -f Bulletins/report.json Bulletins/report.txt Bulletins/dashboard.html docs/mega_pdf/ docs/manifest.json 2>/dev/null || true
          git add -f parishes/consecutive_failures.json parishes/stale_bulletins.json parishes/retry_queue.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "ℹ️  No staged changes — skipping commit."
            exit 0
          fi
          git commit -m "chore: add harvested bulletins for $(date +%Y-%m-%d) [skip ci]"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "✅ Pushed on attempt ${attempt}"
              exit 0
            fi
            echo "⚠️  Push attempt ${attempt} failed; pulling --rebase and retrying…"
            git pull --rebase origin main || {
              echo "❌ Rebase failed; aborting."
              git rebase --abort || true
              exit 1
            }
          done
          echo "❌ Could not push after 5 attempts."
          exit 1


      - name: Prepare standalone Mega PDF artifact
        id: prepare_mega_pdf
        if: success()
        run: |
          set -euo pipefail
          echo "mega_pdf_ready=false" >> "$GITHUB_OUTPUT"
          if [ -f Bulletins/report.json ]; then
            TARGET_DATE=$(python -c "import json; d=json.load(open('Bulletins/report.json')); print(d.get('target_date',''))")
            MEGA_PDF="Bulletins/all_bulletins_${TARGET_DATE}.pdf"
            if [ -f "${MEGA_PDF}" ]; then
              cp "${MEGA_PDF}" Bulletins/mega_bulletin.pdf
              echo "mega_pdf_ready=true" >> "$GITHUB_OUTPUT"
              echo "Prepared standalone Mega PDF: Bulletins/mega_bulletin.pdf"
            else
              echo "Mega PDF not found at expected path: ${MEGA_PDF}"
            fi
          fi

      - name: Upload Mega Bulletin PDF artifact
        if: success() && steps.prepare_mega_pdf.outputs.mega_pdf_ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Mega-Bulletin-PDF
          path: Bulletins/mega_bulletin.pdf
          retention-days: 30

      - name: Upload derry mega bulletin PDF
        if: success() && hashFiles('mega_pdf/derry_mega_bulletin.pdf') != ''
        uses: actions/upload-artifact@v4
        with:
          name: derry-mega-bulletin-pdf
          path: mega_pdf/derry_mega_bulletin.pdf
          retention-days: 30

      - name: Upload down_and_connor mega bulletin PDF
        if: success() && hashFiles('mega_pdf/down_and_connor_mega_bulletin.pdf') != ''
        uses: actions/upload-artifact@v4
        with:
          name: down_and_connor-mega-bulletin-pdf
          path: mega_pdf/down_and_connor_mega_bulletin.pdf
          retention-days: 30

      - name: Upload Mega PDF to Google Drive
        if: success() && steps.prepare_mega_pdf.outputs.mega_pdf_ready == 'true'
        env:
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          set -euo pipefail
          if [ -z "${GDRIVE_SERVICE_ACCOUNT}" ] || [ -z "${GDRIVE_FOLDER_ID}" ]; then
            echo "⏭️  Google Drive upload skipped — GDRIVE_SERVICE_ACCOUNT or GDRIVE_FOLDER_ID secret not set."
            exit 0
          fi
          if ! command -v rclone >/dev/null 2>&1; then
            sudo apt-get update -y >/dev/null
            sudo apt-get install -y rclone >/dev/null
          fi
          RCLONE_BIN=$(command -v rclone)
          mkdir -p ~/.config/rclone
          SA_FILE=$(mktemp)
          trap 'rm -f "${SA_FILE}"' EXIT
          umask 077
          echo "${GDRIVE_SERVICE_ACCOUNT}" > "${SA_FILE}"
          cat > ~/.config/rclone/rclone.conf << EOF
          [gdrive]
          type = drive
          scope = drive
          service_account_file = ${SA_FILE}
          root_folder_id = ${GDRIVE_FOLDER_ID}
          EOF
          TARGET_DATE=$(python -c "import json; d=json.load(open('Bulletins/report.json')); print(d.get('target_date','unknown'))" 2>/dev/null || echo "unknown")
          # Keep one canonical "latest" file in Drive (very high cutoff avoids chunking for this file size).
          "$RCLONE_BIN" copy Bulletins/mega_bulletin.pdf gdrive: --drive-upload-cutoff 1000G --verbose 2>&1 | tail -5
          # Also keep a dated immutable archive copy.
          "$RCLONE_BIN" copyto Bulletins/mega_bulletin.pdf "gdrive:parish_bulletin_${TARGET_DATE}.pdf" --verbose 2>&1 | tail -5
          echo "✅ Mega PDF uploaded to Google Drive folder ${GDRIVE_FOLDER_ID}"

      - name: Upload Bulletins artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: bulletins-${{ github.run_id }}
          path: Bulletins/
          retention-days: 30

      - name: Upload dashboard artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: harvest-dashboard-${{ github.run_id }}
          path: Bulletins/dashboard.html
          retention-days: 30

      - name: Clean transient bulletin PDFs from repository
        if: success()
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p Bulletins/current
          find Bulletins/current -maxdepth 1 -type f -name '*.pdf' -delete || true
          find Bulletins -maxdepth 1 -type f -name 'all_bulletins_*.pdf' -delete || true
          touch Bulletins/current/.gitkeep
          shopt -s nullglob
          pdfs=(Bulletins/all_bulletins_*.pdf)
          if [ ${#pdfs[@]} -gt 0 ]; then
            git add -A Bulletins/current "${pdfs[@]}"
          else
            git add -A Bulletins/current
          fi
          if git diff --cached --quiet; then
            echo "ℹ️  No staged cleanup changes — skipping commit."
            exit 0
          fi
          git commit -m "chore: clean transient bulletin PDFs [skip ci]"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "✅ Cleanup pushed on attempt ${attempt}"
              exit 0
            fi
            echo "⚠️  Cleanup push attempt ${attempt} failed; pulling --rebase and retrying…"
            git pull --rebase origin main || {
              echo "❌ Rebase failed during cleanup; aborting."
              git rebase --abort || true
              exit 1
            }
          done
          echo "❌ Could not push cleanup commit after 5 attempts."
          exit 1

      - name: Update cost dashboard
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python -c "
          from pathlib import Path
          from harvester.cost_tracker import update_dashboard
          update_dashboard(Path('.'))
          " || echo "⚠️  Cost dashboard update failed — harvest continues."
