name: Parish site health (DNS probe)

on:
  schedule:
    - cron: '0 6 * * 1'   # Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run DNS health probe
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python scripts/run_site_health.py

      - name: Commit health snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add parishes/site_health.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update parish DNS health snapshot [skip ci]"
          git push origin HEAD:main
