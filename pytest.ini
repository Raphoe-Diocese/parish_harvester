[pytest]
# Pytest configuration for Parish Bulletin Harvester

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --color=yes
    --maxfail=5

# Markers - define custom test markers here
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests requiring external resources
    unit: marks unit tests (isolated, fast)
    extension: marks tests for Chrome extension functionality
    ocr: marks tests for OCR pipeline
    harvester: marks tests for harvest/fetch functionality
    
# Minimum version
minversion = 7.0

# Coverage options (when pytest-cov is installed)
# Run with: pytest --cov=harvester --cov=ocr --cov-report=html
# [coverage:run]
# source = harvester,ocr
# omit = 
#     tests/*
#     */__pycache__/*
#     */site-packages/*

# Test output
console_output_style = progress

# Warnings
filterwarnings =
    error::DeprecationWarning
    error::PendingDeprecationWarning
    ignore::UserWarning

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout (requires pytest-timeout)
# timeout = 300
# timeout_method = thread
