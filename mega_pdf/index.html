<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Parish Mega Bulletins</title>
    <link rel="stylesheet" href="../assets/site.css" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: Arial, sans-serif;
        background: #f7f8fb;
        color: #1e293b;
      }
      header {
        background: #0b3a75;
        color: white;
        padding: 18px 24px;
        text-align: center;
      }
      header h1 { font-size: 1.4em; margin-bottom: 4px; }
      header p { font-size: 0.85em; opacity: 0.8; }
      .tabs {
        display: flex;
        justify-content: center;
        gap: 12px;
        padding: 16px;
        background: #e8edf5;
        border-bottom: 2px solid #c7d2e8;
      }
      .tab-btn {
        padding: 10px 24px;
        border: 2px solid #0b3a75;
        border-radius: 6px;
        background: white;
        color: #0b3a75;
        font-weight: 600;
        font-size: 0.95em;
        cursor: pointer;
        transition: background 0.15s;
      }
      .tab-btn.active, .tab-btn:hover {
        background: #0b3a75;
        color: white;
      }
      .download-bar {
        display: flex;
        justify-content: center;
        padding: 10px;
        background: #f0f4fb;
        border-bottom: 1px solid #d0d8e8;
      }
      .download-btn {
        display: inline-block;
        padding: 8px 22px;
        background: #16a34a;
        color: white;
        border-radius: 6px;
        font-weight: 600;
        font-size: 0.9em;
        text-decoration: none;
        border: none;
        cursor: pointer;
      }
      .download-btn:hover { background: #15803d; }
      .pdf-viewer {
        height: 90dvh;
        border: none;
        background: white;
      }
      .pdf-viewer iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
      .panel { display: none; }
      .panel.active { display: block; }
    </style>
  </head>
  <body>
    <header>
      <h1>Parish Mega Bulletins</h1>
      <p>Auto-updated after every harvest run</p>
    </header>

    <div class="tabs">
      <button class="tab-btn active" data-diocese="derry" onclick="showPanel('derry', this)">Derry Diocese</button>
      <button class="tab-btn" data-diocese="down_and_connor" onclick="showPanel('down_and_connor', this)">Down &amp; Connor Diocese</button>
    </div>

    <div id="panel-derry" class="panel active">
      <div class="download-bar">
        <a class="download-btn" href="./derry_mega_bulletin.pdf" download>⬇ Download Derry Mega Bulletin PDF</a>
      </div>
      <div class="pdf-viewer">
        <iframe src="./derry_mega_bulletin.pdf" title="Derry Mega Bulletin"></iframe>
      </div>
    </div>

    <div id="panel-down_and_connor" class="panel">
      <div class="download-bar">
        <a class="download-btn" href="./down_and_connor_mega_bulletin.pdf" download>⬇ Download Down &amp; Connor Mega Bulletin PDF</a>
      </div>
      <div class="pdf-viewer">
        <iframe src="./down_and_connor_mega_bulletin.pdf" title="Down and Connor Mega Bulletin"></iframe>
      </div>
    </div>

    <script>
      function showPanel(diocese, button) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('panel-' + diocese).classList.add('active');
        const activeButton = button || document.querySelector('.tab-btn[data-diocese="' + diocese + '"]');
        if (activeButton) activeButton.classList.add('active');
        if (window.location.hash !== '#' + diocese) {
          window.location.hash = diocese;
        }
      }

      const hashDiocese = (window.location.hash || '').replace('#', '');
      if (hashDiocese === 'derry' || hashDiocese === 'down_and_connor') {
        showPanel(hashDiocese);
      }
    </script>
  </body>
</html>
